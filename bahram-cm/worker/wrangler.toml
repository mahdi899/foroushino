name = "broken-mountain-6b4f"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = true

# Deployed URL: https://broken-mountain-6b4f.shokspy.workers.dev
#
# Inbound (Telegram webhook):
#   https://<worker>/api/v1/integrations/telegram/production/webhook
# Outbound (Laravel → Telegram API via proxy):
#   https://<worker>/bot<TOKEN>/sendMessage  (+ Authorization: Bearer <PROXY_SHARED_TOKEN>)
#
# Panel: /admin/telegram/settings → «پل Cloudflare Worker»

[vars]
BACKEND_ORIGIN = "https://rostami.app"
TELEGRAM_API_ORIGIN = "https://api.telegram.org"
WEBHOOK_PATH_PREFIX = "/api/v1/integrations/telegram/"
PROXY_ORIGIN_VALUE = "Cloudflare-Worker"
DEDUPE_TTL_SECONDS = "120"

# Secrets (wrangler secret put — never commit):
#   PROXY_SHARED_TOKEN — same as Laravel PROXY_SHARED_TOKEN / panel token
#
# Inbound webhook secret is validated on Laravel only — Worker forwards as-is.
