; Bahram CM — PHP upload limits for Family Manager media (voice/video/image)
; Install: copy to /etc/php/8.4/fpm/conf.d/99-bahram-uploads.ini and reload php8.4-fpm
; Must match nginx client_max_body_size on /api/v1/family-manager/media (550M).

upload_max_filesize = 512M
post_max_size = 520M
max_file_uploads = 50
max_execution_time = 300
max_input_time = 300
