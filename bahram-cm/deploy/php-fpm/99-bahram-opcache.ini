; Bahram CM — OPcache production tuning
; Copied to /etc/php/8.4/fpm/conf.d/99-bahram-opcache.ini by deploy.sh.
;
; validate_timestamps=0 skips a filesystem stat() on every included file on
; every request — meaningful latency win under load. Safe because deploy.sh
; reloads php-fpm after every deploy, which clears the opcache anyway.
opcache.validate_timestamps = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.save_comments = 1
