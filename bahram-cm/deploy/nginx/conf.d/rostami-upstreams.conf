# Shared upstreams + maps for rostami.app + rostami.club.
# Installed ONCE to /etc/nginx/conf.d/rostami-upstreams.conf (auto-included).
#
# ⚠️ Do NOT redefine these upstream/map names in rostami-app*.conf or
# rostami-club.conf — nginx rejects duplicate declarations when both vhosts
# are enabled.

upstream rostami_next {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream rostami_family_admin {
    server 127.0.0.1:7358;
    keepalive 8;
}

upstream rostami_php {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 16;
}

# Optional Reverb WebSocket — uncomment once BROADCAST_CONNECTION=reverb
# and `php artisan reverb:start` is supervised.
# upstream rostami_reverb {
#     server 127.0.0.1:8080;
# }

# Real client IP: Cloudflare CF-Connecting-IP → first X-Forwarded-For hop → $remote_addr
map $http_cf_connecting_ip $real_client_ip {
    ""      $xff_first_client_ip;
    default $http_cf_connecting_ip;
}

map $http_x_forwarded_for $xff_first_client_ip {
    ""      $remote_addr;
    default $remote_addr;
    "~^(?<first>[^,]+)" $first;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
