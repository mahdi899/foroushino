# Bahram CM — rostami.club (Family PWA — Option B true dual-domain)
#
# Shared upstreams/maps (installed once, do NOT redefine here):
#   /etc/nginx/conf.d/rostami-upstreams.conf
#
# Public:  https://rostami.club            → same Next.js as rostami.app;
#                                            middleware rewrites `/` → `/family`
# Public:  https://family-cdn.rostami.club → family media origin
#
# Install:
#   sudo cp rostami-club.conf /etc/nginx/sites-available/rostami-club.conf
#   sudo ln -sf /etc/nginx/sites-available/rostami-club.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d rostami.club -d www.rostami.club -d family-cdn.rostami.club

server {
    listen 80;
    listen [::]:80;
    server_name rostami.club www.rostami.club family-cdn.rostami.club;
    return 301 https://rostami.club$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rostami.club;

    ssl_certificate     /etc/letsencrypt/live/rostami.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.club/privkey.pem;

    return 301 https://rostami.club$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rostami.club;

    ssl_certificate     /etc/letsencrypt/live/rostami.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.club/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    client_max_body_size 25M;

    location ~ ^/api/v1/family-manager/media {
        root /var/www/bahram-cm/backend/public;
        include fastcgi_params;
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME /var/www/bahram-cm/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/bahram-cm/backend/public;
        client_max_body_size 550M;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Optional Reverb — uncomment after enabling upstream in rostami-upstreams.conf
    # location /app {
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $real_client_ip;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_pass http://rostami_reverb;
    #     proxy_read_timeout 60s;
    # }

    location / {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name family-cdn.rostami.club;

    ssl_certificate     /etc/letsencrypt/live/rostami.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.club/privkey.pem;

    root /var/www/bahram-cm/backend/public;
    index index.php;

    gzip on;
    gzip_types image/svg+xml application/javascript text/css;

    client_max_body_size 550M;

    location ~* ^/(storage|cdn)/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}
