# Bahram CM — rostami.club (Family PWA + Flutter admin panel)
#
# Shared (install once):
#   /etc/nginx/conf.d/rostami-upstreams.conf
#
# Public:  https://rostami.club/          → Next.js :3000 (rewritten to /family/*)
# Public:  https://rostami.club/admin/*   → Flutter web :7358 (PM2)
# Public:  https://family-cdn.rostami.club → family media origin
#
# SSL: certbot --webroot (see deploy/scripts/setup-origin-ssl.sh)

server {
    listen 80;
    listen [::]:80;
    server_name rostami.club www.rostami.club family-cdn.rostami.club;

    include /etc/nginx/snippets/acme-webroot.conf;

    location / {
        return 301 https://rostami.club$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rostami.club;

    ssl_certificate     /etc/letsencrypt/live/rostami.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.club/privkey.pem;

    return 301 https://rostami.club$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rostami.club;

    ssl_certificate     /etc/letsencrypt/live/rostami.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.club/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    client_max_body_size 25M;

    include /etc/nginx/snippets/next-static.conf;

    # Family Manager media upload — direct PHP-FPM (must beat ^~ /api/ catch-all)
    location ^~ /api/v1/family-manager/media {
        root /var/www/bahram-cm/backend/public;
        include fastcgi_params;
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME /var/www/bahram-cm/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/bahram-cm/backend/public;
        client_max_body_size 550M;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Family Manager + member Family JSON API — direct PHP-FPM (Flutter admin)
    location ^~ /api/v1/family-manager/ {
        root /var/www/bahram-cm/backend/public;
        include fastcgi_params;
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME /var/www/bahram-cm/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/bahram-cm/backend/public;
        fastcgi_read_timeout 120s;
    }

    location ^~ /api/v1/family/ {
        root /var/www/bahram-cm/backend/public;
        include fastcgi_params;
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME /var/www/bahram-cm/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/bahram-cm/backend/public;
        fastcgi_read_timeout 90s;
    }

    # Family media playback — same-origin proxy to cdn.rostami.app (Flutter web admin avoids CORS).
    location ^~ /media/family/ {
        proxy_pass https://family_media_cdn;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host cdn.rostami.app;
        proxy_set_header Connection "";
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Flutter Family Manager admin panel (PM2 :7358)
    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass http://rostami_family_admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # API + Next assets — no /family prefix
    location ^~ /api/ {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location ^~ /_next/ {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /sso/ {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js PWA + metadata at club apex — must NOT get a /family/ prefix.
    location = /family-manifest.webmanifest {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /icon {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /apple-icon {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /version.json {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sw-family.js {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /pwa/ {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Family PWA — exact /family (RSC prefetch) must not become /family/family.
    location = /family {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location ^~ /family/ {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location = / {
        proxy_pass http://rostami_next/family;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location / {
        rewrite ^/(.+)$ /family/$1 break;
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name family-cdn.rostami.club;

    ssl_certificate     /etc/letsencrypt/live/rostami.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.club/privkey.pem;

    root /var/www/bahram-cm/backend/storage/app/public;
    index index.php;

    gzip on;
    gzip_types image/svg+xml application/javascript text/css;

    client_max_body_size 550M;

    location ^~ /media/ {
        include /etc/nginx/snippets/media-cors.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~ ^/storage/media/(.*)$ {
        return 301 /media/$1;
    }

    location ~* ^/cdn/ {
        include /etc/nginx/snippets/media-cors.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}
