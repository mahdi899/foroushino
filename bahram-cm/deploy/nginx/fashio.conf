# Bahram CM — fashio.ir production (Arvan Cloud CDN in front)
#
# Public:  https://fashio.ir        → Next.js (PM2 :3000) — همه API از همین دامنه proxy می‌شود
# Public:  https://cdn.fashio.ir    → فقط رسانه (/storage, /cdn)
# Private: 127.0.0.1:8010           → Laravel — فقط از localhost / internal network
#
# ⚠️ api.fashio.ir را عمومی نکنید — در ایران فیلتر/بلاک می‌شود.
# مرورگر هرگز مستقیم به Laravel وصل نمی‌شود؛ Next.js middleware پروکسی می‌کند.

upstream fashio_next {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream fashio_php {
    server unix:/run/php/php8.2-fpm.sock;
    keepalive 16;
}

# Arvan CDN → origin (real IP in X-Forwarded-For / Arvan-Connecting-IP)
map $http_x_forwarded_for $real_client_ip {
    default $remote_addr;
    "~^(?<fwd>[^,]+)" $fwd;
}

server {
    listen 80;
    listen [::]:80;
    server_name fashio.ir www.fashio.ir cdn.fashio.ir;
    return 301 https://fashio.ir$request_uri;
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fashio.ir;

    ssl_certificate     /etc/letsencrypt/live/fashio.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fashio.ir/privkey.pem;

    return 301 https://fashio.ir$request_uri;
}

# Main site — Next.js (API via /api/* proxy داخل Next)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fashio.ir;

    ssl_certificate     /etc/letsencrypt/live/fashio.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fashio.ir/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    client_max_body_size 25M;

    location / {
        proxy_pass http://fashio_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Arvan-Request "1";
        proxy_read_timeout 90s;
    }
}

# Media CDN subdomain — static only (no PHP API routes exposed)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cdn.fashio.ir;

    ssl_certificate     /etc/letsencrypt/live/fashio.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fashio.ir/privkey.pem;

    root /var/www/bahram-cm/backend/public;
    index index.php;

    gzip on;
    gzip_types image/svg+xml application/javascript text/css;

    client_max_body_size 50M;

    # فقط رسانه — بقیه مسیرها بسته
    location ~* ^/(storage|cdn)/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}

# Internal Laravel — فقط localhost (Next.js BACKEND_PROXY_URL)
server {
    listen 127.0.0.1:8010;
    server_name localhost;

    root /var/www/bahram-cm/backend/public;
    index index.php;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass fashio_php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }
}
