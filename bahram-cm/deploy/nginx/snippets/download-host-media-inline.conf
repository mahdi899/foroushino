# Install on the FTP / download host (cdn.rostami.app origin).
# Without this, nginx defaults to Content-Disposition: attachment and mobile
# browsers download voice/video instead of playing inline.
#
# Example server block:
#   location ^~ /media/ {
#       include /path/to/download-host-media-inline.conf;
#       try_files $uri =404;
#   }

add_header Accept-Ranges bytes always;
add_header Content-Disposition inline always;
