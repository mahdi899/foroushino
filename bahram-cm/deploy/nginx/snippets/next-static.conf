# Serve Next.js hashed build assets from disk — not via the Node process.
# Prevents 500/MIME errors when PM2 reloads or cluster workers are out of sync.
location ^~ /_next/static/ {
    alias /var/www/bahram-cm/frontend/.next/static/;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
}
