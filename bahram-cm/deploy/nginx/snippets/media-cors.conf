# Cross-origin media for Flutter web admin (rostami.club) and Next.js (rostami.app).
# Requires map $media_cors_origin in conf.d/rostami-upstreams.conf (http context).

if ($request_method = OPTIONS) {
    add_header Access-Control-Allow-Origin $media_cors_origin;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    add_header Access-Control-Allow-Headers "Range, Accept, Origin, Content-Type";
    add_header Access-Control-Max-Age 86400;
    add_header Content-Length 0;
    return 204;
}

add_header Access-Control-Allow-Origin $media_cors_origin always;
add_header Vary "Origin" always;
add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
add_header Access-Control-Allow-Headers "Range, Accept, Origin, Content-Type" always;
add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
