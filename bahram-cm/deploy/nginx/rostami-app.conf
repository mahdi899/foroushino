# Bahram CM — rostami.app production (Arvan Cloud CDN in front)
#
# Public:  https://rostami.app        → Next.js (PM2 :3000) — همه API از همین دامنه proxy می‌شود
# Public:  https://cdn.rostami.app    → فقط رسانه (/storage, /cdn)
# Private: 127.0.0.1:8010             → Laravel — فقط از localhost / internal network
#
# ⚠️ api.rostami.app را عمومی نکنید — ساب‌دامین‌های api.* در ایران فیلتر/بلاک می‌شوند.
# مرورگر هرگز مستقیم به Laravel وصل نمی‌شود؛ Next.js middleware پروکسی می‌کند —
# به جز دو مسیر زیر که برای پرفورمنس/تایم‌اوت مستقیم به PHP-FPM می‌روند:
#   - webhook تلگرام (/api/v1/integrations/telegram/*/webhook)
#   - آپلود رسانه مدیر خانواده (/api/v1/family-manager/media*)

upstream rostami_next {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream rostami_php {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 16;
}

# Arvan CDN → origin (real IP in X-Forwarded-For / Arvan-Connecting-IP)
map $http_x_forwarded_for $real_client_ip {
    default $remote_addr;
    "~^(?<fwd>[^,]+)" $fwd;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name rostami.app www.rostami.app cdn.rostami.app;
    return 301 https://rostami.app$request_uri;
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rostami.app;

    ssl_certificate     /etc/letsencrypt/live/rostami.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.app/privkey.pem;

    return 301 https://rostami.app$request_uri;
}

# Main site — Next.js (API via /api/* proxy داخل Next), با bypass مستقیم برای
# webhook تلگرام و آپلود رسانه خانواده.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rostami.app;

    ssl_certificate     /etc/letsencrypt/live/rostami.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    client_max_body_size 25M;

    # Telegram webhook — direct to PHP-FPM (small JSON payloads, but must
    # never queue behind Next.js's request pipeline/timeout).
    location ~ ^/api/v1/integrations/telegram/[^/]+/webhook$ {
        root /var/www/bahram-cm/backend/public;
        include fastcgi_params;
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME /var/www/bahram-cm/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/bahram-cm/backend/public;
        fastcgi_read_timeout 30s;
    }

    # Family Manager media upload (chunked, up to ~500MB video) — direct to
    # PHP-FPM, bypassing Next.js entirely (avoids its buffered-body/timeout
    # limits; see frontend/middleware.ts for the matching client-side note).
    location ~ ^/api/v1/family-manager/media {
        root /var/www/bahram-cm/backend/public;
        include fastcgi_params;
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME /var/www/bahram-cm/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/bahram-cm/backend/public;
        client_max_body_size 550M;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    location / {
        proxy_pass http://rostami_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Arvan-Request "1";
        proxy_read_timeout 90s;
    }
}

# Media CDN subdomain — static only (no PHP API routes exposed)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cdn.rostami.app;

    ssl_certificate     /etc/letsencrypt/live/rostami.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rostami.app/privkey.pem;

    root /var/www/bahram-cm/backend/public;
    index index.php;

    gzip on;
    gzip_types image/svg+xml application/javascript text/css;

    client_max_body_size 50M;

    # فقط رسانه — بقیه مسیرها بسته
    location ~* ^/(storage|cdn)/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}

# Internal Laravel — فقط localhost (Next.js BACKEND_PROXY_URL)
server {
    listen 127.0.0.1:8010;
    server_name localhost;

    root /var/www/bahram-cm/backend/public;
    index index.php;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass rostami_php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }
}
