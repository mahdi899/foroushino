; Saat production PHP-FPM pool overrides (Ubuntu 24.04 / PHP 8.4)
; Install:
;   sudo cp saat-www-pool.conf /etc/php/8.4/fpm/pool.d/www.conf
;   sudo php-fpm8.4 -t && sudo systemctl restart php8.4-fpm
;
; 4GB VPS: ~15 workers × ~80MB ≈ 1.2GB — leaves headroom for MySQL/Redis/nginx.

[www]
pm = dynamic
pm.max_children = 15
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Fail hung requests before nginx fastcgi_read_timeout (120s)
request_terminate_timeout = 90s
