# Saat (سات) — Nginx production config for sat.center
# Install:
#   sudo cp sat-center.conf /etc/nginx/sites-available/sat-center.conf
#   sudo ln -sf /etc/nginx/sites-available/sat-center.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d sat.center -d www.sat.center
#   sudo nginx -t && sudo systemctl reload nginx
#
# Layout on server:
#   APP_ROOT=/var/www/saat  →  frontend/dist + backend/public

upstream saat_php {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 16;
}

# Optional Reverb WebSocket (uncomment if BROADCAST_CONNECTION=reverb)
# upstream saat_reverb {
#     server 127.0.0.1:8080;
# }

server {
    listen 80;
    listen [::]:80;
    server_name sat.center www.sat.center;
    return 301 https://sat.center$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sat.center;

    ssl_certificate     /etc/letsencrypt/live/sat.center/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sat.center/privkey.pem;

    return 301 https://sat.center$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sat.center;

    ssl_certificate     /etc/letsencrypt/live/sat.center/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sat.center/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Telegram Mini App (t.me/RostamiAppBot/satcenter) embeds this origin — do not set
    # X-Frame-Options DENY (Telegram WebView needs framing). Tighten later with CSP
    # frame-ancestors https://web.telegram.org if needed.

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    client_max_body_size 25M;

    # ── Laravel API + Sanctum + storage ─────────────────
    location ~ ^/(api|sanctum|storage|up)(/.*)?$ {
        root /var/www/saat/backend/public;
        include fastcgi_params;
        fastcgi_pass saat_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/saat/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/saat/backend/public;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_keep_conn on;
    }

    # Direct PHP in backend public (fallback)
    location ~ ^/index\.php(/|$) {
        root /var/www/saat/backend/public;
        include fastcgi_params;
        fastcgi_pass saat_php;
        fastcgi_param SCRIPT_FILENAME /var/www/saat/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/saat/backend/public;
        fastcgi_read_timeout 120;
    }

    # Optional: Reverb WebSocket
    # location /app {
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_pass http://saat_reverb;
    #     proxy_read_timeout 60s;
    # }

    root /var/www/saat/frontend/dist;
    index index.html;

    # version.json — NEVER cache (client update pipeline)
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # index.html — NEVER cache (Telegram Mini App + PWA)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Hashed static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — no-cache (serves index.html)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
