<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#006F75" />
    <meta name="description" content="سات — اپلیکیشن فروش تلفنی" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="سات" />
    <link rel="icon" type="image/png" href="/saat-logo.png" />
    <link rel="apple-touch-icon" href="/pwa/icon-192.png" />
    <link rel="dns-prefetch" href="//telegram.org" />
    <title>سات — هر تماس، یک فرصت فروش</title>

    <script>
      try {
        var raw = localStorage.getItem('saat-store')
        if (raw) {
          var parsed = JSON.parse(raw)
          var st = parsed && parsed.state
          var userId = st && st.isAuthed && st.currentAgentId ? st.currentAgentId : null
          if (userId) {
            var themeKey = 'saat-theme:' + userId
            var pref = localStorage.getItem(themeKey)
            if (pref === null && st.darkMode === true) {
              pref = 'dark'
              localStorage.setItem(themeKey, 'dark')
            }
            if (pref === 'dark') {
              document.documentElement.setAttribute('data-theme', 'dark')
              document.documentElement.style.colorScheme = 'dark'
              var meta = document.querySelector('meta[name="theme-color"]')
              if (meta) meta.setAttribute('content', '#070C0E')
            }
          }
        }
      } catch (e) {}
    </script>

    <!-- Telegram Mini App: HTML-level cache bust via /version.json + ?_tg= -->
    <script>
      ;(function () {
        try {
          var __h = location.hash
          if (__h && __h.length > 1) {
            var __hp = new URLSearchParams(__h.slice(1))
            var __wd = __hp.get('tgWebAppData')
            if (__wd) sessionStorage.setItem('saat_tgWebAppData', __wd)
          }
        } catch (e0) {}

        function replacePreserveTelegramLaunch(updater) {
          try {
            var u = new URL(location.href)
            updater(u)
            location.replace(u.pathname + u.search + u.hash)
          } catch (eRepl) {}
        }

        var tg =
          (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) ||
          window.TelegramWebviewProxy
        if (!tg) return

        var p = new URLSearchParams(location.search)

        if (p.has('_tg')) {
          var currentHash = p.get('_tg')
          try {
            var xhr = new XMLHttpRequest()
            xhr.open('GET', '/version.json?_=' + Date.now(), false)
            xhr.setRequestHeader('Cache-Control', 'no-cache, no-store')
            xhr.setRequestHeader('Pragma', 'no-cache')
            xhr.send()
            if (xhr.status === 200) {
              var v = JSON.parse(xhr.responseText)
              if (v && v.buildHash && v.buildHash !== currentHash) {
                replacePreserveTelegramLaunch(function (u) {
                  u.searchParams.set('_tg', v.buildHash)
                })
                return
              }
            }
          } catch (e) {}
          return
        }

        try {
          var xhr2 = new XMLHttpRequest()
          xhr2.open('GET', '/version.json?_=' + Date.now(), false)
          xhr2.setRequestHeader('Cache-Control', 'no-cache, no-store')
          xhr2.setRequestHeader('Pragma', 'no-cache')
          xhr2.send()
          if (xhr2.status === 200) {
            var v2 = JSON.parse(xhr2.responseText)
            if (v2 && v2.buildHash) {
              replacePreserveTelegramLaunch(function (u) {
                u.searchParams.set('_tg', v2.buildHash)
              })
            }
          }
        } catch (e2) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
