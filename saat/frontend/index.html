<!doctype html>

<html lang="fa" dir="rtl">

  <head>

    <meta charset="UTF-8" />

    <meta

      name="viewport"

      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"

    />

    <meta name="theme-color" content="#006F75" />

    <meta name="description" content="سات — اپلیکیشن فروش تلفنی" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="apple-mobile-web-app-title" content="سات" />

    <link rel="icon" type="image/png" href="/saat-logo.png" />

    <link rel="apple-touch-icon" href="/pwa/icon-192.png" />

    <title>سات — هر تماس، یک فرصت فروش</title>

    <script>
      try {
        var raw = localStorage.getItem('saat-store')
        if (raw) {
          var parsed = JSON.parse(raw)
          var st = parsed && parsed.state
          var userId = st && st.isAuthed && st.currentAgentId ? st.currentAgentId : null
          if (userId) {
            var themeKey = 'saat-theme:' + userId
            var pref = localStorage.getItem(themeKey)
            if (pref === null && st.darkMode === true) {
              pref = 'dark'
              localStorage.setItem(themeKey, 'dark')
            }
            if (pref === 'dark') {
              document.documentElement.setAttribute('data-theme', 'dark')
              document.documentElement.style.colorScheme = 'dark'
              var meta = document.querySelector('meta[name="theme-color"]')
              if (meta) meta.setAttribute('content', '#070C0E')
            }
          }
        }
      } catch (e) {}
    </script>

  </head>

  <body>

    <div id="root"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script type="module" src="/src/main.tsx"></script>

  </body>

</html>
